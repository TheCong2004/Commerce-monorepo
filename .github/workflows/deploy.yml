name: Triển khai Tự động Cloudflare (CI/CD)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy lên Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cài đặt pnpm
        run: |
          npm install -g pnpm
          pnpm config delete use-node-version
          pnpm config delete node-version

      - name: Kiểm tra môi trường
        run: |
          echo "Node version: $(node -v)"
          echo "Pnpm version: $(pnpm -v)"
          echo "Node path: $(which node)"
          echo "Pnpm path: $(which pnpm)"

      - name: Cài đặt dependencies
        run: pnpm install --frozen-lockfile

      - name: Triển khai Merchant (Sử dụng Node 22)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node -v
          pnpm --filter merchant run deploy

      - name: Triển khai Giao diện Web (OpenNext Cloudflare)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter web run build
          pnpm --filter web run build:cf
          pnpm --filter web run deploy

      - name: Triển khai Telegram Mini App
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter telegram-miniapp run build:cf
          pnpm --filter telegram-miniapp run deploy

      - name: Triển khai các trạm phân tán (Durable Objects)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter chatroom-do run deploy:prod || true
          pnpm --filter ping-do run deploy:prod || true
