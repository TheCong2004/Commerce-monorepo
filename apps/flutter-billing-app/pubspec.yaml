name: billing_app
description: POS Billing App cho Commerce-monorepo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.1.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Giữ nguyên các package của app gốc
  flutter_bloc: ^8.1.5
  get_it: ^7.6.4
  go_router: ^14.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_serializable: ^6.8.0
  equatable: ^2.0.5
  fpdart: ^1.1.0
  mobile_scanner: ^5.1.0
  print_bluetooth_thermal: ^1.0.0
  http: ^1.2.1                    # ← thêm để gọi API merchant
  intl: ^0.19.0

  # Phục hồi các package nguyên bản bị thiếu
  google_fonts: ^6.3.3
  uuid: ^4.5.2
  vibration: ^3.1.8
  permission_handler: ^11.4.0
  app_settings: ^7.0.0
  pretty_qr_code: ^3.6.0
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true